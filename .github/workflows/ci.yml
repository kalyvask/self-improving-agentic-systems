name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + dev deps
        run: pip install -e ".[dev]"
      - name: Run offline tests
        # tau_bench is an optional external dependency (not in pyproject); its adapter
        # test is skipped in CI. Everything else runs with no network and no API key.
        run: pytest -q --ignore=tests/test_taubench.py
